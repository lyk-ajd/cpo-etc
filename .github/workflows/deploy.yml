name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build interior
        working-directory: interior/output/preview
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install + build soho
        working-directory: soho/output/preview
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install + build moving
        working-directory: moving/output/preview
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install + build cleaning
        working-directory: cleaning/output/preview
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Assemble dist (interior + soho + moving + cleaning + root index)
        run: |
          mkdir -p dist/interior dist/soho dist/moving dist/cleaning
          cp -r interior/output/preview/dist/* dist/interior/
          cp -r soho/output/preview/dist/* dist/soho/
          cp -r moving/output/preview/dist/* dist/moving/
          cp -r cleaning/output/preview/dist/* dist/cleaning/
          cp index.html dist/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
